<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ WC2026 Sweepstakes — Rossler Group</title>
<meta property="og:title" content="WC2026 Sweepstakes 🏆">
<meta property="og:description" content="Rossler Group · 8 players · 48 teams · Live standings, draw & special prizes">
<meta property="og:type" content="website">

<style>
:root {
  --bg: #0a0f1a;
  --card: #131a26;
  --card2: #1a2335;
  --border: #263044;
  --text: #e8eef6;
  --muted: #7a8fa8;
  --green: #00c853;
  --green2: #00a844;
  --gold: #ffd700;
  --silver: #c8d0d8;
  --bronze: #cd7f32;
  --red: #ff4444;
  --blue: #4da6ff;
  --purple: #b070ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #0a1f10 0%, #0d2e18 40%, #0a1f10 100%);
  padding: 28px 20px 20px;
  text-align: center;
  border-bottom: 2px solid var(--green2);
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(0,200,83,0.12) 0%, transparent 70%);
}
.header-trophy { font-size: 3.5rem; display: block; margin-bottom: 6px; position: relative; }
.header h1 { font-size: 1.9rem; font-weight: 900; letter-spacing: -1px; position: relative; }
.header-sub {
  color: var(--green);
  font-size: 0.78rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 4px;
  position: relative;
}

/* ── TABS ── */
.tabs {
  display: flex;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: 1;
  min-width: 75px;
  padding: 13px 6px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 600;
  white-space: nowrap;
  transition: all 0.2s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--green); border-bottom-color: var(--green); }

/* ── CONTENT ── */
.tab-pane { display: none; padding: 20px; max-width: 860px; margin: 0 auto; }
.tab-pane.active { display: block; }

/* ── CARDS ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 14px;
}
.section-title {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title span { color: var(--text); font-size: 1rem; font-weight: 700; letter-spacing: 0; text-transform: none; }

/* ── LIVE BADGE ── */
.live-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,68,68,0.15);
  border: 1px solid rgba(255,68,68,0.3);
  color: var(--red);
  font-size: 0.68rem;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 700;
  letter-spacing: 1px;
}
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }
.live-dot { width: 6px; height: 6px; background: var(--red); border-radius: 50%; animation: blink 1.4s infinite; }

/* ── LEADERBOARD TABLE ── */
.lb-wrap { overflow-x: auto; }
.lb-table { width: 100%; border-collapse: collapse; }
.lb-table th {
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  padding: 8px 10px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
.lb-table td { padding: 12px 10px; border-bottom: 1px solid rgba(38,48,68,0.5); vertical-align: top; }
.lb-table tr:last-child td { border-bottom: none; }
.lb-table tr:hover td { background: rgba(255,255,255,0.02); }

.rank-cell { width: 36px; }
.rank-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 50%;
  font-weight: 800; font-size: 0.8rem;
}
.r1 { background: var(--gold); color: #000; }
.r2 { background: var(--silver); color: #000; }
.r3 { background: var(--bronze); color: #fff; }
.rx { background: var(--border); color: var(--text); }

.player-name { font-weight: 700; font-size: 1rem; margin-bottom: 5px; }
.team-chips { display: flex; flex-wrap: wrap; gap: 4px; }
.chip {
  font-size: 0.72rem;
  padding: 2px 7px;
  border-radius: 5px;
  white-space: nowrap;
}
.chip-active { background: rgba(0,200,83,0.12); border: 1px solid rgba(0,200,83,0.3); color: var(--green); }
.chip-bench { background: rgba(255,255,255,0.04); border: 1px solid transparent; color: var(--muted); }
.pts-cell { font-weight: 800; font-size: 1.2rem; color: var(--green); text-align: right; white-space: nowrap; }

/* ── SPECIAL PRIZES ── */
.prizes-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
}
.prize-tile {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 12px;
  text-align: center;
}
.prize-icon { font-size: 1.9rem; display: block; margin-bottom: 4px; }
.prize-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
.prize-winner { font-weight: 700; font-size: 0.95rem; margin-bottom: 2px; }
.prize-desc { font-size: 0.68rem; color: var(--muted); font-style: italic; margin-bottom: 8px; line-height: 1.3; }
.prize-detail { font-size: 0.75rem; color: var(--muted); }

/* ── DRAW GRID ── */
.draw-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
  gap: 14px;
}
.player-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.player-card-header {
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, rgba(0,200,83,0.1), transparent);
  border-bottom: 1px solid var(--border);
}
.player-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: linear-gradient(135deg, var(--green2), var(--green));
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; flex-shrink: 0;
}
.player-card-name { font-weight: 700; font-size: 0.95rem; }
.player-avg { font-size: 0.7rem; color: var(--muted); }
.team-rows { list-style: none; padding: 8px 0; }
.team-row {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 14px;
  font-size: 0.85rem;
}
.team-row:hover { background: rgba(255,255,255,0.02); }
.t-flag { flex-shrink: 0; line-height: 1; }
.flag-img { width: 22px; height: 16px; object-fit: cover; border-radius: 2px; display: inline-block; vertical-align: middle; box-shadow: 0 0 0 1px rgba(255,255,255,0.1); }
.flag-emoji { font-size: 1.1rem; vertical-align: middle; }
.t-name { flex: 1; }
.t-rank { font-size: 0.65rem; color: var(--muted); background: var(--border); padding: 1px 4px; border-radius: 3px; }
.t-tier { font-size: 0.62rem; padding: 1px 5px; border-radius: 3px; }
.tier1 { background: rgba(255,215,0,0.18); color: var(--gold); }
.tier2 { background: rgba(200,208,216,0.15); color: var(--silver); }
.tier3 { background: rgba(205,127,50,0.15); color: var(--bronze); }
.tier4 { background: rgba(77,166,255,0.15); color: var(--blue); }
.tier5 { background: rgba(176,112,255,0.15); color: var(--purple); }
.tier6 { background: rgba(122,143,168,0.12); color: var(--muted); }

/* ── ADMIN ── */
.info-box {
  background: rgba(77,166,255,0.08);
  border: 1px solid rgba(77,166,255,0.25);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 0.82rem;
  color: var(--blue);
  margin-bottom: 16px;
}
.group-block { margin-bottom: 22px; }
.group-hdr {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  font-weight: 700;
  font-size: 0.9rem;
}
.g-badge {
  background: var(--green2);
  color: #000;
  width: 24px; height: 24px;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 0.7rem; font-weight: 900;
}
.match-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 7px;
  margin-bottom: 5px;
  flex-wrap: wrap;
}
.match-teams { flex: 1; min-width: 140px; font-size: 0.85rem; display: flex; align-items: center; gap: 5px; }
.vs-sep { color: var(--muted); font-size: 0.75rem; }
.score-wrap { display: flex; align-items: center; gap: 5px; }
.score-in {
  width: 38px; height: 30px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
  color: var(--text); text-align: center; font-size: 0.9rem; font-weight: 700;
}
.score-in:focus { outline: none; border-color: var(--green); }
.score-dash { color: var(--muted); }
.score-result { font-weight: 800; font-size: 1rem; color: var(--green); min-width: 48px; text-align: center; }
.btn { padding: 5px 11px; border-radius: 5px; border: none; cursor: pointer; font-size: 0.78rem; font-weight: 600; }
.btn-save { background: var(--green2); color: #fff; border: 1px solid var(--green); }
.btn-save:hover { background: var(--green); }
.btn-clear { background: rgba(255,68,68,0.1); color: var(--red); border: 1px solid rgba(255,68,68,0.3); }
.btn-clear:hover { background: rgba(255,68,68,0.2); }
.btn-danger { background: rgba(255,68,68,0.08); color: var(--red); border: 1px solid rgba(255,68,68,0.2); padding: 8px 16px; border-radius: 7px; cursor: pointer; font-size: 0.85rem; }

.stats-table { width: 100%; border-collapse: collapse; }
.stats-table th { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); }
.stats-table td { padding: 7px 8px; border-bottom: 1px solid rgba(38,48,68,0.4); font-size: 0.85rem; }
.stats-in { width: 48px; height: 28px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); text-align: center; font-size: 0.85rem; }
.stats-in:focus { outline: none; border-color: var(--green); }

.gb-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.gb-select, .gb-text, .gb-num {
  padding: 7px 10px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-size: 0.85rem;
}
.gb-select { flex: 1; min-width: 160px; }
.gb-text { flex: 1; min-width: 120px; }
.gb-num { width: 68px; }

/* ── RULES ── */
.rule-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; margin-bottom: 12px; }
.rule-card h3 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--green); margin-bottom: 10px; }
.rule-list { list-style: none; }
.rule-list li { padding: 4px 0 4px 18px; position: relative; font-size: 0.88rem; line-height: 1.55; color: var(--text); }
.rule-list li::before { content: '→'; position: absolute; left: 0; color: var(--green); }
.rule-list li strong { color: var(--gold); }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .header { padding: 20px 16px 14px; }
  .header-trophy { font-size: 2.5rem; }
  .header h1 { font-size: 1.3rem; }
  .header-sub { font-size: 0.68rem; letter-spacing: 2px; }
  .tab-pane { padding: 14px 12px; }
  .tab-btn { padding: 11px 4px; font-size: 0.7rem; }
  /* Leaderboard: stack teams vertically for readability */
  .lb-table th:first-child, .lb-table td:first-child { width: 28px; }
  .lb-table th, .lb-table td { padding: 10px 6px; }
  .pts-cell { font-size: 1rem; }
  .player-name { font-size: 0.92rem; }
  .chip { font-size: 0.68rem; padding: 2px 5px; }
  /* Prizes: 2 columns on phone */
  .prizes-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .prize-tile { padding: 10px 8px; }
  .prize-icon { font-size: 1.5rem; }
  .prize-label { font-size: 0.6rem; }
  .prize-desc { font-size: 0.63rem; }
  /* Draw: 1 column on phone */
  .draw-grid { grid-template-columns: 1fr; }
  .team-row { padding: 5px 12px; }
  /* Admin: score inputs easier to tap */
  .score-in { width: 44px; height: 36px; font-size: 1rem; }
  .match-row { padding: 10px; gap: 6px; }
  .btn { padding: 7px 12px; font-size: 0.8rem; }
}

.share-btn {
  padding: 5px 12px;
  background: rgba(0,200,83,0.12);
  border: 1px solid rgba(0,200,83,0.35);
  border-radius: 6px;
  color: var(--green);
  cursor: pointer;
  font-size: 0.78rem;
  font-weight: 600;
  white-space: nowrap;
}
.share-btn:active { background: rgba(0,200,83,0.25); }

.share-hint {
  text-align: center;
  color: var(--muted);
  font-size: 0.78rem;
  margin-top: 18px;
  padding: 10px;
  border: 1px dashed var(--border);
  border-radius: 8px;
}
</style>
</head>

const flag = t => `<img class="flag-img" src="https://flagcdn.com/20x15/${FLAG_ISOS[t.id]}.png" alt="${t.name}" onerror="this.outerHTML='<span class=\\'flag-emoji\\'>${t.flag}</span>'">`;

const GROUPS = {
  A: ['mexico','southafrica','southkorea','czechia'],
  B: ['canada','bosnia','qatar','switzerland'],
  C: ['brazil','morocco','haiti','scotland'],
  D: ['usa','paraguay','australia','turkey'],
  E: ['germany','curacao','ivorycoast','ecuador'],
  F: ['netherlands','japan','sweden','tunisia'],
  G: ['belgium','egypt','iran','newzealand'],
  H: ['spain','capeverde','saudi','uruguay'],
  I: ['france','senegal','iraq','norway'],
  J: ['argentina','algeria','austria','jordan'],
  K: ['portugal','drcongo','uzbekistan','colombia'],
  L: ['england','croatia','ghana','panama'],
};

// All 72 group stage matches (6 per group, matchday 1-3)
const MATCH_PAIRS = [[0,1],[2,3],[0,2],[1,3],[3,0],[2,1]]; // indices into group teams
const GROUP_MATCHES = [];
Object.entries(GROUPS).forEach(([grp, teams]) => {
  MATCH_PAIRS.forEach(([a, b], i) => {
    GROUP_MATCHES.push({
      id: `${grp}${i+1}`,
      group: grp,
      home: teams[a],
      away: teams[b],
      md: i < 2 ? 1 : i < 4 ? 2 : 3,
    });
  });
});

const PTS = {
  groupWin: 3, groupDraw: 1, groupLoss: 0,
  qualify: 5, r32: 7, r16: 10, qf: 15, sf: 20, champion: 30,
};

// ═══════════════════════════════════════════════
// SEEDED DRAW
// ═══════════════════════════════════════════════

function mulberry32(seed) {
  let a = seed >>> 0;
  return () => {
    a += 0x6D2B79F5; a >>>= 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function hashStr(s) {
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = (((h << 5) + h) + s.charCodeAt(i)) | 0;
  return h;
}

function seededShuffle(arr, rng) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function computeDraw() {
  const rng = mulberry32(hashStr('WC2026-ROSSLER-SWEEPSTAKES'));
  const sorted = [...TEAMS].sort((a, b) => a.rank - b.rank);
  const players = PLAYERS.map(p => ({ ...p, teams: [] }));

  for (let tier = 0; tier < 6; tier++) {
    const slice = sorted.slice(tier * 8, tier * 8 + 8);
    const shuffled = seededShuffle(slice, rng);
    shuffled.forEach((team, pi) => {
      players[pi].teams.push({ ...team, tier: tier + 1 });
    });
  }
  return players;
}

const DRAW = computeDraw();

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════

function defaultState() {
  return {
    matches: {},       // matchId → { hg, ag }
    teamStats: {},     // teamId → { rc: 0, pens: 0 }
    qualified: [],     // teamIds that qualified from group
    goldenBoot: { teamId: '', scorer: '', goals: 0 },
  };
}

function getShareUrl() {
  return window.location.href.split('#')[0];
}

let S = defaultState();
// Live data — written by GitHub Actions (results every 15 min, cards 3x daily)
let RESULTS = { updated: null, matches: [] };
let EXTRAS = { redCards: {} };

function matchWinner(m) {
  if (m.winner === 'HOME_TEAM') return m.home;
  if (m.winner === 'AWAY_TEAM') return m.away;
  if (m.winner === 'DRAW') return null;
  if (m.hs == null || m.as == null) return null;
  if (m.hs > m.as) return m.home;
  if (m.as > m.hs) return m.away;
  if (m.penHome != null && m.penAway != null) return m.penHome > m.penAway ? m.home : m.away;
  return null;
}

// Rebuild S from the synced results so all existing renderers keep working
function applyResults() {
  S = defaultState();

  // group results → our synthesized match ids, matched by team pair
  const byPair = {};
  GROUP_MATCHES.forEach(m => { byPair[[m.home, m.away].sort().join('|')] = m; });
  for (const r of RESULTS.matches) {
    if (r.stage !== 'group' || r.status !== 'FINISHED' || !r.home || !r.away) continue;
    const gm = byPair[[r.home, r.away].sort().join('|')];
    if (gm) S.matches[gm.id] = gm.home === r.home ? { hg: r.hs, ag: r.as } : { hg: r.as, ag: r.hs };
  }

  // qualification bonus once the round-of-32 line-up is known
  const ko = new Set();
  RESULTS.matches.forEach(m => {
    if (m.stage !== 'group') { if (m.home) ko.add(m.home); if (m.away) ko.add(m.away); }
  });
  const r32Known = RESULTS.matches.filter(m => m.stage === 'r32' && m.home && m.away).length >= 16;
  S.qualified = r32Known ? [...ko] : [];

  // red cards (cards bot) + shoot-out penalties scored
  TEAMS.forEach(t => { S.teamStats[t.id] = { rc: (EXTRAS.redCards || {})[t.id] || 0, pens: 0 }; });
  RESULTS.matches.forEach(m => {
    if (m.status !== 'FINISHED' || m.duration !== 'PENALTY_SHOOTOUT') return;
    if (m.home && S.teamStats[m.home]) S.teamStats[m.home].pens += m.penHome || 0;
    if (m.away && S.teamStats[m.away]) S.teamStats[m.away].pens += m.penAway || 0;
  });
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════

const teamById = id => TEAMS.find(t => t.id === id);
const ownerOf  = id => DRAW.find(p => p.teams.some(t => t.id === id));

function parsedResult(matchId) {
  const r = S.matches[matchId];
  if (!r) return null;
  const hg = parseInt(r.hg), ag = parseInt(r.ag);
  if (isNaN(hg) || isNaN(ag)) return null;
  return { hg, ag };
}

// ═══════════════════════════════════════════════
// COMPUTATIONS
// ═══════════════════════════════════════════════

function groupStageStats() {
  // Per-team: pts, w, d, l, gf, ga, gd from group stage
  const stats = {};
  TEAMS.forEach(t => { stats[t.id] = { pts: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, played: 0 }; });

  GROUP_MATCHES.forEach(m => {
    const r = parsedResult(m.id);
    if (!r) return;
    const { hg, ag } = r;
    const h = stats[m.home], a = stats[m.away];
    h.played++; h.gf += hg; h.ga += ag; h.gd += hg - ag;
    a.played++; a.gf += ag; a.ga += hg; a.gd += ag - hg;
    if (hg > ag)      { h.w++; h.pts += 3; a.l++; }
    else if (hg === ag) { h.d++; h.pts++; a.d++; a.pts++; }
    else              { h.l++; a.w++; a.pts += 3; }
  });
  return stats;
}

function computeTeamPoints() {
  const gs = groupStageStats();
  const pts = {};
  TEAMS.forEach(t => { pts[t.id] = gs[t.id].pts; });

  // Qualification bonuses
  S.qualified.forEach(id => { if (pts[id] !== undefined) pts[id] += PTS.qualify; });

  // Knockout bonuses straight from the synced results (third-place
  // play-off intentionally scores nothing, per the published rules)
  const stagePts = { r32: PTS.r32, r16: PTS.r16, qf: PTS.qf, sf: PTS.sf, final: PTS.champion };
  RESULTS.matches.forEach(m => {
    if (m.status !== 'FINISHED' || !stagePts[m.stage]) return;
    const w = matchWinner(m);
    if (w && pts[w] !== undefined) pts[w] += stagePts[m.stage];
  });

  return pts;
}

function computeStandings() {
  const tpts = computeTeamPoints();
  return DRAW.map(player => {
    const scored = player.teams
      .map(t => ({ ...t, pts: tpts[t.id] || 0 }))
      .sort((a, b) => b.pts - a.pts);
    const total = scored.slice(0, 3).reduce((s, t) => s + t.pts, 0);
    return { ...player, scored, total };
  }).sort((a, b) => b.total - a.total);
}

function computePrizes() {
  const gs = groupStageStats();

  // Wooden Spoon — worst GD (team with most negative GD)
  let wsTeam = null, wsGD = Infinity;
  TEAMS.forEach(t => {
    const s = gs[t.id];
    if (s.played > 0 && s.gd < wsGD) { wsGD = s.gd; wsTeam = t; }
  });

  // Goal Machine — most goals scored in group stage
  let gmTeam = null, gmGF = -1;
  TEAMS.forEach(t => {
    const s = gs[t.id];
    if (s.gf > gmGF) { gmGF = s.gf; gmTeam = t; }
  });

  // Upset King — single biggest win over a higher-ranked team (rank difference)
  let ukTeam = null, ukDiff = 0;
  GROUP_MATCHES.forEach(m => {
    const r = parsedResult(m.id);
    if (!r) return;
    const { hg, ag } = r;
    const ht = teamById(m.home), at = teamById(m.away);
    if (!ht || !at) return;
    if (hg > ag && ht.rank > at.rank) { // lower-ranked home wins
      const d = ht.rank - at.rank;
      if (d > ukDiff) { ukDiff = d; ukTeam = ht; }
    }
    if (ag > hg && at.rank > ht.rank) { // lower-ranked away wins
      const d = at.rank - ht.rank;
      if (d > ukDiff) { ukDiff = d; ukTeam = at; }
    }
  });

  // Drama Queen — most red cards
  let dqTeam = null, dqRC = 0;
  TEAMS.forEach(t => {
    const rc = (S.teamStats[t.id] || {}).rc || 0;
    if (rc > dqRC) { dqRC = rc; dqTeam = t; }
  });

  // Penalty Hero — most penalties scored
  let phTeam = null, phPens = 0;
  TEAMS.forEach(t => {
    const p = (S.teamStats[t.id] || {}).pens || 0;
    if (p > phPens) { phPens = p; phTeam = t; }
  });

  // Golden Boot
  const gb = S.goldenBoot;
  const gbTeam = gb.teamId ? teamById(gb.teamId) : null;

  return {
    woodenSpoon: wsTeam ? { team: wsTeam, owner: ownerOf(wsTeam.id), stat: `GD: ${wsGD}` } : null,
    goalMachine: gmTeam && gmGF > 0 ? { team: gmTeam, owner: ownerOf(gmTeam.id), stat: `${gmGF} goals` } : null,
    upsetKing:   ukTeam ? { team: ukTeam, owner: ownerOf(ukTeam.id), stat: `+${ukDiff} ranks` } : null,
    dramaQueen:  dqTeam && dqRC > 0 ? { team: dqTeam, owner: ownerOf(dqTeam.id), stat: `${dqRC} 🟥` } : null,
    penaltyHero: phTeam && phPens > 0 ? { team: phTeam, owner: ownerOf(phTeam.id), stat: `${phPens} pens` } : null,
    goldenBoot:  gbTeam ? { team: gbTeam, owner: ownerOf(gbTeam.id), stat: `${gb.scorer} ${gb.goals}⚽` } : null,
  };
}

// ═══════════════════════════════════════════════
// RENDER: STANDINGS
// ═══════════════════════════════════════════════

function renderStandings() {
  const el = document.getElementById('standings');
  const standings = computeStandings();
  const prizes = computePrizes();

  const rankHtml = (i) => {
    const cls = ['r1','r2','r3'][i] || 'rx';
    const label = i < 3 ? (i+1) : (i+1);
    return `<span class="rank-badge ${cls}">${label}</span>`;
  };

  const rows = standings.map((p, i) => {
    const chips = p.scored.map((t, j) => {
      const cls = j < 3 ? 'chip chip-active' : 'chip chip-bench';
      return `<span class="${cls}">${flag(t)} ${t.name} · ${t.pts}pt</span>`;
    }).join('');
    return `
      <tr>
        <td class="rank-cell">${rankHtml(i)}</td>
        <td>
          <div class="player-name">${p.emoji} ${p.name}</div>
          <div class="team-chips">${chips}</div>
        </td>

  }).join('');

  const PRIZE_DESCS = {
    'Golden Boot':  'Owns the tournament\'s top goal scorer',

    'Penalty Hero': 'Most shoot-out penalties scored across all their teams',

  const prizeTile = (icon, label, data) => {
    const desc = PRIZE_DESCS[label] || '';
    if (!data) {
      return `<div class="prize-tile">
        <span class="prize-icon">${icon}</span>
        <div class="prize-label">${label}</div>
        <div class="prize-desc">${desc}</div>
        <div class="prize-winner" style="color:var(--muted)">TBD</div>
        <div class="prize-detail">—</div>
      </div>`;
    }
    return `<div class="prize-tile">
      <span class="prize-icon">${icon}</span>
      <div class="prize-label">${label}</div>
      <div class="prize-desc">${desc}</div>
      <div class="prize-winner">${data.owner ? data.owner.emoji + ' ' + data.owner.name : '?'}</div>
      <div class="prize-detail">${flag(data.team)} ${data.stat}</div>
    </div>`;
  };

  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap">
      <div class="section-title"><span>🏆 Standings</span></div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="live-badge"><span class="live-dot"></span>LIVE</span>
        <button class="share-btn" onclick="shareStandings()" title="Copy link to share current standings">📤 Share</button>
      </div>
    </div>
    <p style="color:var(--muted);font-size:0.7rem;margin:-8px 0 12px">${RESULTS.updated
      ? 'Results as of ' + new Date(RESULTS.updated).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }) + ', ' + new Date(RESULTS.updated).toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' })
      : 'Awaiting first results sync'}</p>
    <div class="card">
      <div class="lb-wrap">
        <table class="lb-table">
          <thead><tr>
            <th>#</th><th>Player · Teams (top 3 count ✅)</th><th style="text-align:right">Pts</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>

    <div class="section-title" style="margin-top:22px"><span>🎖️ Special Prizes</span></div>
    <div class="prizes-grid">
      ${prizeTile('🥇','Golden Boot', prizes.goldenBoot)}
      ${prizeTile('🪵','Wooden Spoon', prizes.woodenSpoon)}
      ${prizeTile('🎯','Goal Machine', prizes.goalMachine)}
      ${prizeTile('👑','Upset King', prizes.upsetKing)}
      ${prizeTile('🎭','Drama Queen', prizes.dramaQueen)}
      ${prizeTile('⚽','Penalty Hero', prizes.penaltyHero)}
    </div>
  `;
}

// ═══════════════════════════════════════════════
// RENDER: DRAW
// ═══════════════════════════════════════════════

function renderDraw() {
  const el = document.getElementById('draw');
  const tierClass = t => `tier${t}`;

  const cards = DRAW.map(p => {
    const avg = Math.round(p.teams.reduce((s, t) => s + t.rank, 0) / p.teams.length);
    const rows = [...p.teams]
      .sort((a, b) => a.rank - b.rank)
      .map(t => `
        <li class="team-row">
          <span class="t-flag">${flag(t)}</span>
          <span class="t-name">${t.name}</span>
          <span class="t-rank">#${t.rank}</span>
          <span class="t-tier ${tierClass(t.tier)}">T${t.tier}</span>
        </li>`).join('');

    return `
      <div class="player-card">
        <div class="player-card-header">
          <div class="player-avatar">${p.emoji}</div>
          <div>
            <div class="player-card-name">${p.name}</div>
            <div class="player-avg">Avg rank: #${avg}</div>
          </div>
        </div>
        <ul class="team-rows">${rows}</ul>
      </div>`;
  }).join('');

  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <div class="section-title"><span>🎲 The Draw</span></div>
      <span style="font-size:0.7rem;color:var(--muted)">Seed: WC2026-ROSSLER</span>
    </div>
    <p style="color:var(--muted);font-size:0.78rem;margin-bottom:16px">
      6 teams per player · Balanced across 6 tiers (T1 = Elite, T6 = Underdogs)<br>
      <span style="color:var(--gold)">T1</span> <span style="color:var(--silver)">T2</span> <span style="color:var(--bronze)">T3</span> <span style="color:var(--blue)">T4</span> <span style="color:var(--purple)">T5</span> <span style="color:var(--muted)">T6</span>
    </p>
    <div class="draw-grid">${cards}</div>
    <div class="share-hint">📸 Screenshot this tab and share to WhatsApp!<br>Also open <strong>draw-card.html</strong> for a cleaner share card.</div>
  `;
}

// ═══════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════

function shareStandings() {
  const url = getShareUrl();
  if (navigator.share) {
    navigator.share({ title: 'WC2026 Sweepstakes Standings', url });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('Link copied! Paste it into WhatsApp.'));
  } else {
    prompt('Copy this link and paste into WhatsApp:', url);
  }
}

// ═══════════════════════════════════════════════
// TAB ROUTING
// ═══════════════════════════════════════════════

let activeTab = 'standings';

const renderers = {
  standings: renderStandings,
  draw: renderDraw,
  rules: renderRules,
};

document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  const tab = btn.dataset.tab;
  if (tab === activeTab) return;

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById(tab).classList.add('active');

  activeTab = tab;
  renderers[tab]();
});

// ═══════════════════════════════════════════════
// DATA LOADING — synced JSON written by GitHub Actions
// ═══════════════════════════════════════════════

async function loadData() {
  try {
    const bust = `?t=${Date.now()}`;
    const [r, e] = await Promise.all([
      fetch('data/results.json' + bust).then(x => x.json()),
      fetch('data/extras.json' + bust).then(x => x.json()).catch(() => ({ redCards: {} })),
    ]);
    RESULTS = r;
    EXTRAS = e;
  } catch (err) {
    console.warn('Could not load live data (serve over HTTP, not file://):', err);
  }
  applyResults();
  renderers[activeTab]();
}

// Initial render
renderStandings();
renderDraw();
loadData();
setInterval(loadData, 5 * 60 * 1000);
